{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <title>Iniciar Sesión | Escuela Kaiser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="text-center fw-bold mb-4">Iniciar Sesión</h2>
                        
                        
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-3">Ingresar</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p>¿No tenés cuenta? <a href="{% url 'clases:registro' %}">Registrate acá</a></p>
                            <a href="{% url 'inicio' %}" class="text-muted text-decoration-none">⬅ Volver al inicio</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
